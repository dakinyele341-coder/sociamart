<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SociaMart — Logo Preview</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; }
      .row { padding: 40px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
      .light { background: #f7f7fb; }
      .dark { background: #1a1a2e; color: #fff; }
      img { height: 64px; }
      h2 { width: 100%; margin: 0 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: .08em; opacity: .6; }
    </style>
  </head>
  <body>
    <div class="row light">
      <h2>Light backgrounds</h2>
      <img src="./logo-light.svg" alt="SociaMart light wordmark" />
      <img src="./logo-icon.svg" alt="SociaMart icon" />
    </div>
    <div class="row dark">
      <h2>Dark backgrounds</h2>
      <img src="./logo-dark.svg" alt="SociaMart dark wordmark" />
      <img src="./logo-icon.svg" alt="SociaMart icon" />
    </div>
  </body>
</html>
